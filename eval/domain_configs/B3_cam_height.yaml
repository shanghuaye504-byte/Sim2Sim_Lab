# B3_cam_height.yaml
# agentview 沿 Z 轴抬高
# 俯视角度增大，物体投影形状变化
name: cam_height
levels:
  weak:
    camera:
      shifts:
        - name: "agentview"
          pos_offset: [0.0, 0.0, 0.04]
  medium:
    camera:
      shifts:
        - name: "agentview"
          pos_offset: [0.0, 0.0, 0.07]
  strong:
    camera:
      shifts:
        - name: "agentview"
          pos_offset: [0.0, 0.0, 0.12]