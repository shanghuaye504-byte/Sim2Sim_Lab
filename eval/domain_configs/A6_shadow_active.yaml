# A6_shadow_active.yaml
# 关闭阴影并逐级"扁平化"光照
# weak: 仅关闭阴影（深度线索减少但颜色不变）
# medium: 关闭阴影 + 提高环境光（减弱明暗对比）
# strong: 关闭阴影 + 高环境光 + 低镜面反射（几乎无立体感）
name: shadow_active
levels:
  weak:
    lighting:
      castshadow: 0
  medium:
    lighting:
      castshadow: 0
      ambient_scale: 1.4
      specular_scale: 0.5
  strong:
    lighting:
      castshadow: 0
      ambient_scale: 1.8
      specular_scale: 0.2
      diffuse_scale: 0.7