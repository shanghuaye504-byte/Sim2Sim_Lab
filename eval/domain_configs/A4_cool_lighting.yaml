# A4_cool_lighting.yaml
# 增加蓝通道减少红通道，模拟荧光灯/阴天
# weak: 轻微偏蓝
# medium: 明显冷色调
# strong: 强烈偏蓝，接近月光场景
name: cool_lighting
levels:
  weak:
    lighting:
      color_shift: [-0.04, 0.0, 0.06]
  medium:
    lighting:
      color_shift: [-0.08, 0.0, 0.12]
  strong:
    lighting:
      color_shift: [-0.15, 0.0, 0.20]