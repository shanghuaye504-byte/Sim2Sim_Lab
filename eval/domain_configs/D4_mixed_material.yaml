# D4_mixed_material.yaml
# 同时调整多种材质属性
# weak: 轻微"塑料感"增强
# medium: 明显视觉偏差，表面过于光亮
# strong: 极端光亮 + 桌面额外高反射
name: mixed_material
levels:
  weak:
    material:
      global_specular_scale: 1.5
      global_shininess_scale: 1.5
      global_reflectance_scale: 1.3
  medium:
    material:
      global_specular_scale: 2.5
      global_shininess_scale: 2.5
      global_reflectance_scale: 2.0
  strong:
    material:
      global_specular_scale: 4.0
      global_shininess_scale: 4.0
      global_reflectance_scale: 3.0
      material_shifts:
        - name_contains: "table"
          specular: 0.9
          shininess: 0.95
          reflectance: 0.6