# B7_cam_fov_narrow.yaml
# 减小视场角 → 视野更窄，物体更大，可能裁切工作区边缘
name: cam_fov_narrow
levels:
  weak:
    camera:
      shifts:
        - name: "agentview"
          fovy_offset: -5.0
  medium:
    camera:
      shifts:
        - name: "agentview"
          fovy_offset: -10.0
  strong:
    camera:
      shifts:
        - name: "agentview"
          fovy_offset: -16.0