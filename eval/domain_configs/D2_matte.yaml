# D2_matte.yaml
# 降低镜面反射和光泽度 — 所有表面变得哑光/粗糙
# 影响：缺少高光线索，物体形状感知依赖漫反射
name: matte
levels:
  weak:
    material:
      global_specular_scale: 0.40
      global_shininess_scale: 0.40
  medium:
    material:
      global_specular_scale: 0.15
      global_shininess_scale: 0.15
  strong:
    material:
      global_specular_scale: 0.03
      global_shininess_scale: 0.03