# A5_direction_shift.yaml
# 偏移光源方向（向 +X 偏移 → 光从右侧打来）
# 改变阴影投射方向和表面明暗分布
# weak: 阴影方向轻微变化
# medium: 阴影明显偏转，部分原本亮的面变暗
# strong: 大幅偏转，场景明暗关系显著改变
name: direction_shift
levels:
  weak:
    lighting:
      direction_offset: [0.15, 0.05, 0.0]
  medium:
    lighting:
      direction_offset: [0.30, 0.10, 0.0]
  strong:
    lighting:
      direction_offset: [0.50, 0.20, 0.0]